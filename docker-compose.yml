services:
  rag-core:
    build:
      context: ./rag_core
      dockerfile: Dockerfile
    container_name: rag_core
    expose:
      - "8001"
    volumes:
      - ./rag_core/data:/app/data
      - ./rag_core/logs:/app/logs
      - hf_cache:/root/.cache/huggingface
    environment:
      - HF_HOME=/root/.cache/huggingface
    networks:
      - rag_network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  web-api:
    build:
      context: ./web_api
      dockerfile: Dockerfile
    container_name: rag_web_api
    ports:
      - "8000:8000"
    environment:
      - RAG_CORE_URL=http://rag-core:8001 
    depends_on:
      - rag-core
    networks:
      - rag_network
    restart: unless-stopped

  frontend:
      build:
        context: ./frontend
        dockerfile: Dockerfile
      container_name: rag_frontend
      ports:
        - "80:80"
      depends_on:
        - web-api
      networks:
        - rag_network
      restart: unless-stopped

networks:
  rag_network:
    driver: bridge

volumes:
  hf_cache:
    name: rag_hf_cache